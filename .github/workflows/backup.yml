name: Backup to Release

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run backup script
        run: |
          chmod +x ftp.sh
          bash ftp.sh

      - name: Upload to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_TAG="backup"
          REPO="${GITHUB_REPOSITORY}"
          
          RELEASE_INFO=$(curl -s \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/releases/tags/${RELEASE_TAG}")
          
          RELEASE_ID=$(echo "$RELEASE_INFO" | grep -o '"id": *[0-9]*' | head -1 | grep -o '[0-9]*')
          
          if [ -z "$RELEASE_ID" ]; then
            echo "创建新的 Release..."
            CREATE_RESP=$(curl -s -X POST \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/${REPO}/releases" \
              -d "{\"tag_name\":\"${RELEASE_TAG}\",\"target_commitish\":\"${GITHUB_REF_NAME}\",\"name\":\"Backup\",\"body\":\"\",\"draft\":false,\"prerelease\":false}")
            RELEASE_ID=$(echo "$CREATE_RESP" | grep -o '"id": *[0-9]*' | head -1 | grep -o '[0-9]*')
          fi
          
          [ -z "$RELEASE_ID" ] && { echo "无法获取/创建 Release"; exit 1; }
          
          echo "Release ID: $RELEASE_ID"
          
          for file in *.7z; do
            [ ! -f "$file" ] && continue
            
            filename=$(basename "$file")
            echo "上传: $filename"
            
            ASSETS=$(curl -s -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/releases/${RELEASE_ID}/assets")
            
            OLD_ID=$(echo "$ASSETS" | grep -B 3 "\"name\": \"$filename\"" | grep '"id"' | grep -o '[0-9]*' | head -1)
            
            if [ -n "$OLD_ID" ]; then
              echo "  删除旧文件 (ID: $OLD_ID)..."
              curl -s -X DELETE \
                -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${REPO}/releases/assets/${OLD_ID}"
              sleep 1
            fi
            
            UPLOAD_RESP=$(curl -s -X POST \
              --max-time 600 \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/x-7z-compressed" \
              -T "$file" \
              "https://uploads.github.com/repos/${REPO}/releases/${RELEASE_ID}/assets?name=${filename}")
            
            DL_URL=$(echo "$UPLOAD_RESP" | grep -o '"browser_download_url":"[^"]*"' | cut -d'"' -f4)
            
            if [ -n "$DL_URL" ]; then
              SIZE=$(stat -c%s "$file" 2>/dev/null || echo 0)
              SIZE_MB=$(echo "scale=2; $SIZE / 1024 / 1024" | bc)
              echo "  上传成功: ${SIZE_MB} MB"
              echo "  下载地址: $DL_URL"
            else
              echo "  上传失败"
            fi
          done
          
          echo "备份完成"
